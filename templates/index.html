<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sales Demand Forecasting</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container">

<h1>Sales Demand Forecasting</h1>

<p>
Upload your sales dataset (.csv) to train the machine learning model.
</p>

{% with messages = get_flashed_messages() %}
{% if messages %}

<div class="message">

{% for message in messages %}
<p>{{ message }}</p>
{% endfor %}

</div>

{% endif %}
{% endwith %}

<form
action="/train"
method="POST"
enctype="multipart/form-data">

<input
type="file"
name="dataset"
accept=".csv"
required>

<br><br>

<button type="submit">
Train Model
</button>

</form>

</div>

</body>
</html>
